version: '3.8'

services:
  vaultwarden:
    # МЫ БОЛЬШЕ НЕ СОБИРАЕМ ОБРАЗ! Используем официальный сразу.
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always

    environment:
      # ОСНОВНЫЕ
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED:-false}
      - WEBSOCKET_ENABLED=${WEBSOCKET_ENABLED:-true}
      - DOMAIN=${DOMAIN:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - INVITATIONS_ALLOWED=${INVITATIONS_ALLOWED:-true}
      - SHOW_PASSWORD_HINT=${SHOW_PASSWORD_HINT:-true}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - REQUIRE_DEVICE_EMAIL=${REQUIRE_DEVICE_EMAIL:-false}
      - SENDS_ALLOWED=${SENDS_ALLOWED:-true}
      - TRASH_AUTO_DELETE_DAYS=${TRASH_AUTO_DELETE_DAYS:-30}

      # Cloudflare Tunnel / Reverse Proxy настройки
      - IP_HEADER=CF-Connecting-IP

    volumes:
      # Данные базы и паролей
      - vw-data:/data

      # ИДЕАЛЬНО ДЛЯ PORTAINER: ПОДМЕНА ЛОГОТИПОВ НА ЛЕТУ ЧЕРЕЗ VOLUMES (БЕЗ СБОРКИ!)
      # Мы берем файлы из папки branding на сервере и "накладываем" их поверх стандартных файлов внутри контейнера.
      - ./branding/logo.png:/web-vault/images/logo-dark@2x.png:ro
      - ./branding/logo.png:/web-vault/images/logo-light@2x.png:ro
      - ./branding/logo.png:/web-vault/images/logo.png:ro
      - ./branding/logo-icon.png:/web-vault/images/icon.png:ro
      - ./branding/favicon-32.png:/web-vault/images/favicon.ico:ro
      - ./branding/logo-email.png:/web-vault/images/logo-email.png:ro

    # ПРОБРОС ПОРТОВ ДЛЯ ТУННЕЛЯ CLOUDFLARE (НА ДРУГОЙ ВИРТУАЛКЕ)
    # Настройки Cloudflare: http://IP_ВАШЕГО_СЕРВЕРА:8080
    ports:
      - "8087:80"

volumes:
  vw-data:
